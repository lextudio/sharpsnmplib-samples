name: .NET Core

on: [push, pull_request]

jobs:
  macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Setup .NET Core
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          8.0.x
          9.0.x
          10.0.x
    - name: Build
      shell: bash
      run: |
        sudo sysctl -w net.inet.udp.maxdgram=65535
        export CI=true
        set -e
        pwsh -file release.ps1 Release
    - name: Test
      shell: pwsh
      run: dotnet test --project Tests/CSharpCore/Tests.NetStandard.csproj --configuration Release --no-build

  linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Setup .NET Core
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          8.0.x
          9.0.x
          10.0.x
    - name: Build
      shell: bash
      run: |
        dotnet --info
        set -e
        pwsh -file release.ps1 Release
    - name: Test
      shell: pwsh
      run: dotnet test --project Tests/CSharpCore/Tests.NetStandard.csproj --configuration Release --no-build

  windows:

    runs-on: windows-2022

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Setup .NET Core
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          8.0.x
          9.0.x
          10.0.x
    - name: Ensure IPv6 Enabled
      shell: pwsh
      run: |
        $bindings = Get-NetAdapterBinding -ComponentID ms_tcpip6 -ErrorAction SilentlyContinue
        if (-not $bindings) {
          Write-Warning "No IPv6 adapter bindings were detected on this runner."
          exit 0
        }

        $disabled = $bindings | Where-Object { -not $_.Enabled }
        if ($disabled) {
          foreach ($binding in $disabled) {
            Write-Host "Enabling IPv6 for adapter '$($binding.Name)'..."
            Enable-NetAdapterBinding -Name $binding.Name -ComponentID ms_tcpip6 -ErrorAction Continue
          }
        }

        Write-Host "IPv6 adapter binding status:"
        Get-NetAdapterBinding -ComponentID ms_tcpip6 | Format-Table -AutoSize
    - name: Build
      shell: cmd
      run: build.release.bat
    - name: Test
      shell: pwsh
      run: dotnet test --project Tests/CSharpCore/Tests.NetStandard.csproj --configuration Release --no-build
